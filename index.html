<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Distancia x Triangulação</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            background-color: #1e1e1e;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 12px 32px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 650px;
            border-top: 5px solid #00b377;
        }
        h1 {
            font-size: 22px;
            margin-bottom: 15px;
            color: #00b377;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        /* Status dos Inputs Selecionados */
        .status-container {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
            background-color: #151515;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #333;
        }
        .status-box {
            text-align: center;
            padding: 8px;
            border-radius: 6px;
            background-color: #262626;
            border: 2px solid transparent;
            transition: all 0.2s;
        }
        .status-box.active {
            border-color: #ffcc00;
            background-color: #332a00;
        }
        .status-label {
            font-size: 11px;
            color: #aaa;
            text-transform: uppercase;
            margin-bottom: 4px;
        }
        .status-value {
            font-size: 20px;
            font-weight: bold;
            color: #fff;
        }

        /* Layout do Pano da Roleta */
        .roulette-board {
            display: grid;
            grid-template-columns: 60px repeat(12, 1fr);
            gap: 4px;
            background-color: #052e16;
            padding: 12px;
            border-radius: 8px;
            overflow-x: auto;
            border: 2px solid #0f5132;
            margin-bottom: 15px;
        }
